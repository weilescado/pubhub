<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - 高校国际出版流程模拟实训平台</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f4f5f7 0%, #e6fcff 100%);
    }
    .auth-card {
      background: white;
      width: 400px;
      padding: 40px;
      border-radius: 12px;
      box-shadow: var(--shadow-lg);
      text-align: center;
    }
    .auth-card h1 {
      color: var(--primary);
      margin-bottom: 8px;
    }
    .auth-card p {
      margin-bottom: 32px;
      font-size: 14px;
    }
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--line);
      margin-bottom: 24px;
    }
    .tab {
      flex: 1;
      padding: 12px;
      cursor: pointer;
      font-weight: 600;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
    }
    .tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 13px;
    }
    .error-msg {
      color: #de350b;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="auth-card">
    <h1>实训平台登录</h1>
    <p>International Publishing Lab</p>

    <div class="tabs">
      <div class="tab active" id="tab-login">登录</div>
      <div class="tab" id="tab-register">注册账号</div>
    </div>

    <form id="auth-form">
      <div class="form-group">
        <label>邮箱地址</label>
        <input type="text" id="email" placeholder="student@university.edu.cn" required />
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="button" style="width: 100%;">进入实训</button>
      <div class="error-msg" id="error-msg"></div>
    </form>
  </div>

  <script>
    const API_BASE_DEFAULT = "/api";
    const resolveApiBase = () => {
      const override = localStorage.getItem("API_BASE_OVERRIDE");
      if (override && typeof override === "string") {
        return override.replace(/\/+$/, "");
      }
      return API_BASE_DEFAULT;
    };
    const API_URL = resolveApiBase();
    let isRegister = false;

    const tabLogin = document.getElementById('tab-login');
    const tabRegister = document.getElementById('tab-register');
    const form = document.getElementById('auth-form');
    const submitBtn = form.querySelector('button');
    const errorMsg = document.getElementById('error-msg');

    tabLogin.onclick = () => {
      isRegister = false;
      tabLogin.classList.add('active');
      tabRegister.classList.remove('active');
      submitBtn.textContent = "进入实训";
      errorMsg.style.display = 'none';
    };

    tabRegister.onclick = () => {
      isRegister = true;
      tabRegister.classList.add('active');
      tabLogin.classList.remove('active');
      submitBtn.textContent = "注册并登录";
      errorMsg.style.display = 'none';
    };

    form.onsubmit = async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const endpoint = isRegister ? '/register' : '/login';

      submitBtn.disabled = true;
      submitBtn.textContent = "处理中...";
      errorMsg.style.display = 'none';

      try {
        const res = await fetch(API_URL + endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        
        if (!res.ok) {
          throw new Error(data.error || '请求失败');
        }

        // Login success logic (even after register)
        if (isRegister) {
          // Auto login after register
          const loginRes = await fetch(API_URL + '/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const loginData = await loginRes.json();
          localStorage.setItem('currentUser', JSON.stringify(loginData.user));
        } else {
          localStorage.setItem('currentUser', JSON.stringify(data.user));
        }

        window.location.href = 'index.html';

      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = isRegister ? "注册并登录" : "进入实训";
      }
    };
  </script>
</body>
</html>
