<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>后台管理 - 高校国际出版流程模拟实训平台</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .admin-container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 24px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: white;
      padding: 24px;
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--line-light);
    }
    .stat-card h3 {
      font-size: 32px;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .stat-card p {
      margin: 0;
      font-size: 13px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      box-shadow: var(--shadow-sm);
      border-radius: 8px;
      overflow: hidden;
    }
    th, td {
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid var(--line-light);
    }
    th {
      background: #fafbfc;
      font-weight: 600;
      color: var(--text-muted);
    }
    tr:hover {
      background: #f4f5f7;
    }
    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .status-badge.good { background: #e3fcef; color: #006644; }
    .status-badge.mid { background: #fffae6; color: #ff8b00; }
    .status-badge.none { background: #dfe1e6; color: #42526e; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <small>Admin Dashboard</small>
      <strong>后台管理中心</strong>
    </div>
    <nav>
      <a class="nav-link" href="index.html">返回前台</a>
      <a class="nav-link active" href="#">用户数据</a>
      <a class="nav-link" href="#" onclick="logout()">退出登录</a>
    </nav>
  </header>

  <main class="admin-container">
    <div class="stats-grid">
      <div class="stat-card">
        <h3 id="total-users">-</h3>
        <p>注册学生总数</p>
      </div>
      <div class="stat-card">
        <h3 id="active-users">-</h3>
        <p>有进度的用户</p>
      </div>
      <div class="stat-card">
        <h3 id="total-reviews">-</h3>
        <p>AI 点评次数</p>
      </div>
    </div>

    <div class="panel">
      <h2>学生实训表现</h2>
      <div id="kp-stats" style="margin-bottom:16px;">
        <h3>知识点汇总 (KP) - 平均掌握度</h3>
        <div id="kp-table">加载中...</div>
      </div>
      <table>
        <thead>
          <tr>
            <th>邮箱 / 学号</th>
            <th>注册时间</th>
            <th>当前进度</th>
            <th>完成步骤数 (Max 9)</th>
            <th>获得 AI 点评数</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="user-table">
          <tr><td colspan="7" style="text-align:center;">加载中...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="api-base.js"></script>
  <script src="step-config.js"></script>
  <script>
    const API_URL = resolveApiBase();
    
    // Auth Check
    const userStr = localStorage.getItem('currentUser');
    if (!userStr) {
      window.location.href = 'login.html';
    }
    const user = JSON.parse(userStr);
    // In real app, check user.isAdmin

    function logout() {
      localStorage.removeItem('currentUser');
      window.location.href = 'login.html';
    }

    async function loadData() {
      try {
        const res = await fetch(API_URL + '/admin/stats');
        const data = await res.json();
        
        document.getElementById('total-users').textContent = data.length;
        document.getElementById('active-users').textContent = data.filter(u => u.progress_steps > 0).length;
        document.getElementById('total-reviews').textContent = data.reduce((acc, u) => acc + u.reviews_count, 0);

        const tbody = document.getElementById('user-table');
        tbody.innerHTML = '';

        data.forEach(u => {
          const tr = document.createElement('tr');
          const date = new Date(u.created_at).toLocaleDateString();
          
          let statusClass = 'none';
          let statusText = '未开始';
          if (u.progress_steps > 0 && u.progress_steps < 9) {
            statusClass = 'mid';
            statusText = '进行中';
          } else if (u.progress_steps >= 9) {
            statusClass = 'good';
            statusText = '已完成';
          }

          let stepTitle = "未开始";
          if (u.latest_step && window.STEP_CONFIG && window.STEP_CONFIG[u.latest_step]) {
            stepTitle = window.STEP_CONFIG[u.latest_step].title;
          } else if (u.latest_step && u.latest_step !== "None" && u.latest_step !== "") {
            stepTitle = u.latest_step;
          }

          tr.innerHTML = `
            <td>${u.email}</td>
            <td>${date}</td>
            <td>${stepTitle}</td>
            <td>${u.progress_steps}</td>
            <td>${u.reviews_count}</td>
            <td><span class="status-badge ${statusClass}">${statusText}</span></td>
            <td>
              <button class="button ghost" style="padding: 4px 8px; font-size: 12px;" onclick="showUserDetail('${u.id}')">查看详情</button>
            </td>
          `;
          tbody.appendChild(tr);
        });

      } catch (e) {
        console.error(e);
        alert('加载数据失败，请检查后端是否启动');
      }
    }

    loadData();
    // load KP stats panel with sorting and CSV export
    (async function loadKPStats(){
      const container = document.getElementById('kp-table');
      container.innerHTML = '加载中...';
      try{
        const res = await fetch(API_URL + '/admin/kp_stats');
        let data = await res.json();
        if(!data || data.length===0){ container.innerHTML = '<div>暂无评估统计。</div>'; return }

        // UI controls
        const controls = document.createElement('div');
        controls.style.display = 'flex';
        controls.style.gap = '8px';
        controls.style.marginBottom = '8px';
        const sortSelect = document.createElement('select');
        ['avg_score','avg_ai_score','count'].forEach(k=>{ const o=document.createElement('option'); o.value=k; o.textContent=k; sortSelect.appendChild(o)});
        const orderBtn = document.createElement('button'); orderBtn.className='button secondary small'; orderBtn.textContent='升序';
        const exportBtn = document.createElement('button'); exportBtn.className='button'; exportBtn.textContent='导出 CSV';
        controls.appendChild(sortSelect); controls.appendChild(orderBtn); controls.appendChild(exportBtn);
        container.innerHTML = '';
        container.appendChild(controls);

        let asc = true;
        const render = (arr)=>{
          // remove old table if any
          const old = container.querySelector('table'); if (old) old.remove();
          const table = document.createElement('table');
          table.style.width='100%'; table.style.borderCollapse='collapse'; table.style.background='white'; table.style.boxShadow='var(--shadow-sm)';
          const thead = document.createElement('thead'); thead.innerHTML = '<tr><th style="text-align:left;padding:8px">KP</th><th style="padding:8px">样本数</th><th style="padding:8px">平均分</th><th style="padding:8px">AI平均分</th></tr>';
          table.appendChild(thead);
          const tbody = document.createElement('tbody');
          arr.forEach(row=>{
            const avg = row.avg_score != null ? Number(row.avg_score).toFixed(2) : '-';
            const aavg = row.avg_ai_score != null ? Number(row.avg_ai_score).toFixed(2) : '-';
            const tr = document.createElement('tr');
            if (row.avg_score != null && row.avg_score < 3) tr.style.background = '#fff2f0';
            tr.innerHTML = `<td style="padding:8px">${row.kp}</td><td style="padding:8px">${row.count}</td><td style="padding:8px">${avg}</td><td style="padding:8px">${aavg}</td>`;
            tbody.appendChild(tr);
          });
          table.appendChild(tbody);
          container.appendChild(table);
        };

        const sortAndRender = ()=>{
          const key = sortSelect.value;
          data.sort((a,b)=>{
            const av = a[key] == null ? -Infinity : a[key];
            const bv = b[key] == null ? -Infinity : b[key];
            return asc ? (av - bv) : (bv - av);
          });
          render(data);
        };

        sortSelect.onchange = sortAndRender;
        orderBtn.onclick = ()=>{ asc = !asc; orderBtn.textContent = asc ? '升序' : '降序'; sortAndRender(); };
        exportBtn.onclick = ()=>{
          const rows = data.map(r=>({kp:r.kp,count:r.count,avg_score:r.avg_score,avg_ai_score:r.avg_ai_score}));
          const header = ['kp','count','avg_score','avg_ai_score'];
          const csv = [header.join(',')].concat(rows.map(r=>header.map(h=> (r[h] == null ? '' : r[h]) ).join(','))).join('\n');
          const blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a'); a.href = url; a.download = 'kp_stats.csv'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
        };

        // initial render
        sortAndRender();

      }catch(e){ console.error(e); container.textContent = '无法加载 KP 统计：' + e.message }
    })();
  </script>
  <script>
    async function showUserDetail(userId) {
      try {
        const res = await fetch(resolveApiBase() + '/admin/user_detail?userId=' + encodeURIComponent(userId));
        const data = await res.json();
        // build modal
        const overlay = document.createElement('div'); overlay.className = 'tutorial-overlay active';
        const modal = document.createElement('div'); modal.className = 'tutorial-modal'; modal.style.width = '800px';
        let html = `<div class="tutorial-header"><h2>用户详情</h2><button class="tutorial-close">&times;</button></div>`;
        html += '<div style="padding:16px; max-height:60vh; overflow:auto">';
        html += `<h3>进度 (${data.progress.length})</h3>`;
        data.progress.forEach(p=>{
          html += `<div style="margin-bottom:8px"><strong>${p.step_id}</strong>: ${p.updated_at}<br/>`;
          try{ const d=typeof p.data==='string'?JSON.parse(p.data):p.data; html += `<pre style="white-space:pre-wrap">${JSON.stringify(d, null, 2)}</pre>`;}catch(e){ html += `<pre>${p.data}</pre>` }
          html += '</div>';
        });
        html += `<h3>评估 (${data.assessments.length})</h3>`;
        if (data.assessments.length===0) html += '<p>暂无评估记录。</p>';
        data.assessments.forEach(a=>{
          html += `<div style="border-top:1px solid #eee; padding-top:8px; margin-top:8px">`;
          html += `<strong>${a.step_id} - ${a.kp}</strong> 分数: ${a.score || '-'} AI分: ${a.ai_score || '-'}<br/>`;
          if (a.comment) html += `<div>备注: ${a.comment}</div>`;
          html += `<div style="color:#999; font-size:12px">${a.created_at}</div>`;
          html += `</div>`;
        });
        html += `<h3>AI 点评 (${data.reviews.length})</h3>`;
        data.reviews.forEach(r=>{ html += `<div style="border-top:1px dashed #f0f0f0; padding-top:8px"><pre style="white-space:pre-wrap">${r.feedback}</pre><div style="color:#999; font-size:12px">${r.created_at}</div></div>` });
        html += '</div>';
        modal.innerHTML = html;
        modal.querySelector('.tutorial-close').onclick = () => overlay.remove();
        overlay.appendChild(modal);
        document.body.appendChild(overlay);
      } catch (e) {
        alert('无法获取用户详情: ' + e.message);
      }
    }
  </script>
</body>
</html>
